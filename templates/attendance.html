{% extends "layout.html" %}

{% block title %}Attendance{% endblock %}

{% block content %}

<h2>Today's Attendance</h2>

<form method="POST">

    <table border="1" cellpadding="8">

        <tr>
            <th>Name</th>
            <th>Room</th>
            <th>Year</th>
            <th>Status</th>
        </tr>

        {% for student in students %}

        <tr>

            <td>{{ student.name }}</td>

            <td>{{ student.room }}</td>

            <td>

                <select name="status_{{ student.id }}">

                    <option value="Present">Present</option>

                    <option value="Absent">Absent</option>

                </select>

            </td>

        </tr>

        {% endfor %}

    </table>

    <br>

    <button type="submit">
        Save Attendance
    </button>

</form>
<br><br>

<a href="{{ url_for('today_attendance') }}">
    <button>View Today's Attendance</button>
</a>

{% endblock %}
