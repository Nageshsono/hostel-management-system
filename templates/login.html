{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<h2>Login</h2>

<form method="POST">

    <label>Username</label>

    <input type="text" name="username" required>

    <label>Password</label>

    <input type="password" name="password" required>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<br>

<p>
    Don't have an account?
    <a href="{{ url_for('register') }}">
        Register
    </a>
</p>
<footer>
    <p>🚀 Developed with ❤️ by Dharavath Nagesh | 💻 Full Stack Developer</p>
</footer>
{% endblock %}
