{% extends "layout.html" %}

{% block title %}Edit Student{% endblock %}

{% block content %}

<div class="container">

    <h2>✏️ Edit Student</h2>

    <form method="POST">

        <label>Name</label>
        <input type="text" name="name" value="{{ student.name }}" required>

        <label>Gender</label>
        <select name="gender" required>
            <option value="Male" {% if student.gender=="Male" %}selected{% endif %}>Male</option>
            <option value="Female" {% if student.gender=="Female" %}selected{% endif %}>Female</option>
        </select>

        <label>Mobile</label>
        <input type="text" name="mobile" value="{{ student.mobile }}" required>

        <label>Address</label>
        <textarea name="address" required>{{ student.address }}</textarea>

        <label>Room</label>
        <select name="room_no" required>
            {% for i in range(1,7) %}
            <option value="{{ i }}" {% if student.room==i %}selected{% endif %}>
                Room {{ i }}
            </option>
            {% endfor %}
        </select>

        <label>Year</label>
        <select name="year" required>
            <option value="1st Year" {% if student.year=="1st Year" %}selected{% endif %}>1st Year</option>
            <option value="2nd Year" {% if student.year=="2nd Year" %}selected{% endif %}>2nd Year</option>
            <option value="3rd Year" {% if student.year=="3rd Year" %}selected{% endif %}>3rd Year</option>
            <option value="4th Year" {% if student.year=="4th Year" %}selected{% endif %}>4th Year</option>
        </select>

        <label>Department</label>
        <input type="text" name="department" value="{{ student.department }}" required>

        <br><br>

        <button type="submit" class="btn btn-success">
            💾 Update Student
        </button>

        <a href="{{ url_for('students') }}" class="btn btn-danger">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
